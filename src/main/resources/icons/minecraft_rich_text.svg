<?xml version="1.0" encoding="UTF-8"?>
<!-- Logo SVG pour Minecraft Rich Text
     - Format vectoriel, adapté pour icônes (toolbar, plugin page)
     - Emplacement : src/main/resources/icons/minecraft_rich_text.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512" role="img" aria-label="Minecraft Rich Text logo">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="50%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect x="6" y="6" width="116" height="116" rx="18" ry="18" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Cercle lumineux central -->
  <circle cx="64" cy="46" r="28" fill="rgba(255,255,255,0.06)" />

  <!-- Symbole § stylisé (texte, centré) -->
  <text x="64" y="55" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="56" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" fill-opacity="0.95">§</text>

  <!-- Palette de couleurs (carrés) en bas à droite -->
  <g transform="translate(72,80)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#1E90FF" stroke="#000000" stroke-opacity="0.08"/>
    <rect x="14" y="0" width="12" height="12" rx="2" fill="#00C853" stroke="#000000" stroke-opacity="0.08"/>
    <rect x="28" y="0" width="12" height="12" rx="2" fill="#FFD600" stroke="#000000" stroke-opacity="0.08"/>
    <rect x="42" y="0" width="12" height="12" rx="2" fill="#FF3D00" stroke="#000000" stroke-opacity="0.08"/>
    <!-- Petite bordure blanche entre la palette et le bord -->
    <rect x="-3" y="-3" width="60" height="18" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>

  <!-- Petit sigle texte en bas (MRT) -->
  <text x="64" y="106" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9">Minecraft Rich Text</text>
</svg>
